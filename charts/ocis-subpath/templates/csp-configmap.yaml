{{- $csp := .Values.ocis.csp | default dict -}}
{{- if ($csp.enabled | default false) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocis-subpath.fullname" . }}-csp
  labels:
    {{- include "ocis-subpath.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  csp.yaml: |
    directives:
{{ toYaml ($csp.directives | default dict) | indent 6 }}
{{- end }}
