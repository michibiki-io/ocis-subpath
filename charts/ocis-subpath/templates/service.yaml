apiVersion: v1
kind: Service
metadata:
  name: {{ include "ocis-subpath.fullname" . }}
  labels:
    {{- include "ocis-subpath.labels" . | nindent 4 }}
    app.kubernetes.io/component: service
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ocis-subpath.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ocis-subpath.fullname" . }}-idp
  labels:
    {{- include "ocis-subpath.labels" . | nindent 4 }}
    app.kubernetes.io/component: idp-service
spec:
  type: ClusterIP
  ports:
    - name: idp
      port: 9130
      targetPort: idp
      protocol: TCP
  selector:
    {{- include "ocis-subpath.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ocis-subpath.fullname" . }}-frontend
  labels:
    {{- include "ocis-subpath.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend-service
spec:
  type: ClusterIP
  ports:
    - name: frontend
      port: 9140
      targetPort: frontend
      protocol: TCP
  selector:
    {{- include "ocis-subpath.selectorLabels" . | nindent 4 }}
