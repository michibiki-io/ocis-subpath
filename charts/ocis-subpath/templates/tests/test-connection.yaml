apiVersion: v1
kind: Pod
metadata:
  name: {{ include "ocis-subpath.fullname" . }}-test-connection
  labels:
    {{- include "ocis-subpath.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - sh
        - -ec
        - wget -qO- http://{{ include "ocis-subpath.fullname" . }}:{{ .Values.service.port }}{{ include "ocis-subpath.probePath" . | trim }}
  restartPolicy: Never
