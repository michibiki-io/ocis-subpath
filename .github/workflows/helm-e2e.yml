name: helm-e2e

on:
  pull_request:
    paths:
      - "charts/ocis-subpath/**"
      - "images/ocis-subpath/**"
      - "images/web-assets-patcher/**"
      - "scripts/build-patcher-image.sh"
      - "scripts/e2e/**"
      - "tests/e2e/**"
      - "Makefile"
      - ".github/workflows/helm-e2e.yml"

jobs:
  helm-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.33.1

      - uses: azure/setup-helm@v4
        with:
          version: v3.18.0

      - uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.30.0

      - name: Restore E2E asset cache
        uses: actions/cache@v4
        with:
          path: .tmp/e2e-assets
          key: e2e-assets-big-buck-bunny-alt-v1

      - name: Run Helm chart e2e on kind
        env:
          E2E_ASSET_CACHE_DIR: ${{ github.workspace }}/.tmp/e2e-assets
          E2E_FIXTURE_USER_AGENT: ocis-subpath-e2e/1.0 (https://github.com/michibiki-io/ocis-subpath)
        run: |
          KEEP_ON_FAILURE=false make e2e-helm-kind

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-e2e-playwright-results
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
          if-no-files-found: ignore
